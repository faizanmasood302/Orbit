<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative overflow-x-hidden">

                ORBIT

<!-- Navigation Links -->

<a class="font-['Space_Grotesk'] tracking-widest uppercase text-xs font-bold text-white/60 hover:text-white transition-colors duration-300 hover:text-[#00f2ff] hover:drop-shadow-[0_0_8px_rgba(0,242,255,0.5)]" href="#">About</a>

</div>

<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center relative pt-20 pb-16 px-6">
<!-- Shrunken Globe Background Element (Bottom Left) -->
<div class="absolute bottom-0 left-[-100px] w-[500px] h-[500px] opacity-30 pointer-events-none z-0 mix-blend-screen">
<img alt="Globe graphic" class="w-full h-full object-cover rounded-full filter contrast-125 saturate-50" data-alt="A highly detailed, luminous cyan wireframe globe emerging from a pitch-black deep space void. The globe features precise, minimalist longitudinal and latitudinal lines with glowing intersection nodes, embodying a high-tech, cinematic aesthetic. It is positioned as if seen from a low orbital perspective, casting a soft, emissive cyan ambient light against the surrounding extreme negative space, evoking a sense of calm authority and cutting-edge reliability." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvuRrQ_HTQX-xcW5RUfZ5ivXzT7O-pNvUTXRsHtFkGPwEtkcAep5pF0ywgTXb2R0cZILDbCDmFXZhdH6lxY9YYjdM96x_Dn4T2CPG_pYxwZibA-nUHsYVKPLBoPS07cRLLJwlb5ebymg332MT8GY480oVUEQCkgGzQNy_sutVrkuPvSjKYswOi_yGGeV4A2k85_PjYiB0zNpa-Sf3VYbdws93zHkbAubYTSzjSDgVKC0rN5Lm0rFttfcxUKAjwkAFVAeEJniEIcgI"/>
<div class="absolute inset-0 bg-gradient-to-tr from-background via-transparent to-background rounded-full"></div>

<!-- Contact Form Container (Glassmorphism) -->
<div class="glass-panel w-full max-w-[600px] p-12 md:p-16 z-10 relative mt-8">
<div class="mb-12">
<h1 class="font-h2 text-h2 text-on-surface mb-4">INITIALIZE COMM-LINK</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-sm">Transmit your coordinates and inquiry. Our orbital command team will intercept and respond.</p>
</div>
<form class="space-y-10">
<!-- Name Field -->
<div class="input-group relative">
<input class="block w-full bg-transparent border-0 border-b border-white/20 text-on-surface font-body-md py-2 px-0 focus:ring-0 focus:border-primary-container transition-colors peer" id="designation" placeholder=" " required="" type="text"/>
<label class="absolute top-2 left-0 font-label-caps text-label-caps text-white/40 uppercase transition-all duration-300 pointer-events-none" for="designation">Operator Designation (Name)</label>
</div>
<!-- Email Field -->
<div class="input-group relative">
<input class="block w-full bg-transparent border-0 border-b border-white/20 text-on-surface font-body-md py-2 px-0 focus:ring-0 focus:border-primary-container transition-colors peer" id="frequency" placeholder=" " required="" type="email"/>
<label class="absolute top-2 left-0 font-label-caps text-label-caps text-white/40 uppercase transition-all duration-300 pointer-events-none" for="frequency">Comm Frequency (Email)</label>
</div>
<!-- Message Field -->
<div class="input-group relative">
<textarea class="block w-full bg-transparent border-0 border-b border-white/20 text-on-surface font-body-md py-2 px-0 focus:ring-0 focus:border-primary-container transition-colors peer resize-none" id="transmission" placeholder=" " required="" rows="3"></textarea>
<label class="absolute top-2 left-0 font-label-caps text-label-caps text-white/40 uppercase transition-all duration-300 pointer-events-none" for="transmission">Transmission Payload (Message)</label>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full bg-primary-container text-black font-label-caps text-label-caps py-4 px-8 tracking-widest hover:shadow-[0_0_20px_rgba(0,242,255,0.6)] hover:bg-[#74f5ff] transition-all duration-300 flex items-center justify-center space-x-2" type="button">
<span>TRANSMIT SIGNAL</span>
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</form>
